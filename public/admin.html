<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Médico - Agenda del Día</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen font-sans">

    <div class="max-w-5xl mx-auto py-10 px-4">
        <header class="flex justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <div>
                <h1 class="text-3xl font-bold text-slate-900">Panel de Administración</h1>
                <p class="text-sm text-slate-500 mt-1">Agenda diaria de consultas médicas</p>
            </div>
            <a href="/" class="text-sm font-semibold text-blue-600 hover:underline">← Ir a Vista de Pacientes</a>
        </header>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <div class="flex flex-wrap gap-4 items-end mb-6 pb-6 border-b border-slate-100">
                <div class="w-full sm:w-48">
                    <label class="block text-xs font-semibold text-slate-500 mb-1">Seleccionar Doctora</label>
                    <select id="doctora" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-sm" onchange="cargarAgenda()">
                        <option value="A">Dr. A — Ortodoncia</option>
                        <option value="B">Dr. B — General</option>
                    </select>
                </div>
                <div class="w-full sm:w-48">
                    <label class="block text-xs font-semibold text-slate-500 mb-1">Fecha</label>
                    <input type="date" id="fecha" value="2026-06-01" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-sm" onchange="cargarAgenda()">
                </div>
                <button onclick="cargarAgenda()" class="bg-slate-900 hover:bg-slate-800 text-white font-medium text-sm py-2.5 px-5 rounded-xl transition">
                    Actualizar Agenda
                </button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-slate-200 text-slate-400 text-xs uppercase tracking-wider font-semibold">
                            <th class="py-3 px-4">Horario</th>
                            <th class="py-3 px-4">Estado</th>
                            <th class="py-3 px-4">Paciente</th>
                            <th class="py-3 px-4">DNI</th>
                            <th class="py-3 px-4">Contacto</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-cuerpo" class="text-sm divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
            
            <div id="sin-turnos" class="text-center py-10 text-slate-400 hidden">
                No hay bloques de horarios configurados para este día.
            </div>
        </div>
    </div>

    <script>
        async function cargarAgenda() {
            const fecha = document.getElementById('fecha').value;
            const doctora = document.getElementById('doctora').value;
            const cuerpo = document.getElementById('tabla-cuerpo');
            const sinTurnos = document.getElementById('sin-turnos');

            cuerpo.innerHTML = "";
            sinTurnos.classList.add('hidden');

            try {
                const response = await fetch(`/api/admin/agenda?fecha=${fecha}&doctora=${doctora}`);
                const agenda = await response.json();

                if (agenda.length === 0) {
                    sinTurnos.classList.remove('hidden');
                    return;
                }

                agenda.forEach(turno => {
                    const tr = document.createElement('tr');
                    tr.className = turno.estado === 'Reservado' ? 'bg-amber-50/50 hover:bg-amber-50 transition' : 'hover:bg-slate-50/80 transition';
                    
                    // Badge de estado
                    const badgeEstado = turno.estado === 'Reservado' 
                        ? `<span class="px-2 py-1 text-xs font-bold bg-amber-100 text-amber-800 rounded-lg">Reservado</span>`
                        : `<span class="px-2 py-1 text-xs font-bold bg-slate-100 text-slate-500 rounded-lg">Libre</span>`;

                    // Datos del paciente
                    const nombre = turno.paciente ? turno.paciente.nombre : '<span class="text-slate-300">—</span>';
                    const dni = turno.paciente ? turno.paciente.dni : '<span class="text-slate-300">—</span>';
                    const telefono = turno.paciente ? turno.paciente.telefono : '<span class="text-slate-300">—</span>';

                    tr.innerHTML = `
                        <td class="py-3.5 px-4 font-bold text-slate-700">🕒 ${turno.hora} hs</td>
                        <td class="py-3.5 px-4">${badgeEstado}</td>
                        <td class="py-3.5 px-4 font-medium text-slate-900">${nombre}</td>
                        <td class="py-3.5 px-4 text-slate-600">${dni}</td>
                        <td class="py-3.5 px-4 text-slate-600">${telefono}</td>
                    `;
                    cuerpo.appendChild(tr);
                });

            } catch (error) {
                console.error("Error al cargar la agenda:", error);
            }
        }

        // Carga inicial automática
        window.onload = cargarAgenda;
    </script>
</body>
</html>
